<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Code X</title>
    <link rel="icon" type="image/png" href="Screenshot_17-2-2026_102916_www.design.com.jpeg">
    <style>
        * {
            margin: 0;
            font-family: Georgia, 'Times New Roman', Times, serif;
        }
        body {
            background-color: white;
        }
        h1 {
            display: flex;
            align-items: center;
            margin-top: 20px;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: whitesmoke;
            padding: 10px 20px;
            border-radius: 20px;
        }
        h1 img {
            height: 50px;
            width: 50px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 15px;
        }
        h1 span {
            flex: 1;
            text-align: center;
        }
        .a {
            width: 300px;
            padding: 12px 15px;
            border: 2px solid  rgb(37, 69, 87);
            border-radius: 25px;
            outline: none;
            font-size: 16px;
            display: flex;
            justify-self: center;
            margin-top: 20px;
            transition: 0.3s;
        }

        .a:focus {
            border-color: rgb(37, 69, 87);
            box-shadow: 0 0 8px rgba(44, 83, 100, 0.5);
        }
        .b {
            width: 300px;
            padding: 12px 15px;
            border: 2px solid  rgb(37, 69, 87);
            border-radius: 25px;
            outline: none;
            font-size: 16px;
            display: flex;
            justify-self: center;
            margin-top: 20px;
            transition: 0.3s;
        }

        .b:focus {
            border-color: rgb(37, 69, 87);
            box-shadow: 0 0 8px rgba(44, 83, 100, 0.5);
        }
        input{
            margin: 0;
        }
        .c{
            font-size: 40px;
            text-align: center;
            margin-bottom: 40px;
            margin-top: 20px;
            
        }
        .d{
            text-align: center;
            margin-top: 10px;
        }
        
           .e {
    padding: 0 30px;
    height: 36px;
    font-size: 16px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 30px auto 0;
    background-color: #2c5364;
    color: whitesmoke;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: 0.4s;
         }
         .e:hover{
            color: #2c5364;
            background-color: whitesmoke;
         }
    </style>
</head>
<body>
    <h1>
        <img src="result (1).png">
        <span>Learn with Code X</span>
    </h1>
    <p class="c">Start ur coding journey here!</p>
    <p class="d">Student name:</p>
     <input type="text" class="a" placeholder="Enter your name">
     <p class="d">Given password:</p>
     <input type="password" class="b" placeholder="Enter your password">
     <button class="e">Login</button>
</body>
<script>
const users = {
    "mike": "mike123",
    "alazar": "aluti",
    "amen": "ag6767",
    "adoni": "6769"
};

document.querySelector(".e").addEventListener("click", function () {
    const username = document.querySelector(".a").value;
    const password = document.querySelector(".b").value;

    if (users[username] && users[username] === password) {
           window.location.href = "info.html";
    } else {
        alert("Invalid username or password");
    }
});
</script>

</html>
